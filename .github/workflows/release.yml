name: Release Automática de Extensão (TribeCraft)
#Extension: R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT, R2_BUCKET, DISCORD_WEBHOOK, DISCORD_RELEASES_WEBHOOK

on:
  push:
    tags:
      - '*'

env:
  MODULE_ID: "ultimateoutpost" # ID da extensão para as pastas
  PROJECT_FOLDER: "api/ultimateoutpost" # Pasta base no R2
  MIN_JAVA_VERSION: "21"
  DISCORD_EMBED_TRIBE: "https://api.tribecraft.com.br/src/logo.png"
  DISCORD_EMBED_THUMBNAIL: "https://api.tribecraft.com.br/src/outpost_thumbnail.png"
  # Configuração do Post de Release
  UPDATE_TITLE: "🧩 Ultimate Outpost API: ${MAVEN_NAME}"
  UPDATE_MESSAGE: |
    [B]Eco:[/B] Ultimate Outpost
    [B]Update:[/B] ${MAVEN_VERSION}
    [B]Status:[/B] Stable and submitted to the API Repository.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Extrair Informações do Maven
        run: |
          echo "MAVEN_NAME=$(mvn help:evaluate -Dexpression=project.name -q -DforceStdout)" >> $GITHUB_ENV
          echo "MAVEN_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.MIN_JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Notificar Início (Discord)
        run: |
          VERSION_TAG="${{ github.ref_name }}"
          curl -s -X POST -H "Content-Type: application/json" \
               -d '{
                 "username": "TribeCraft Build",
                 "avatar_url": "${{ env.DISCORD_EMBED_THUMBNAIL }}",
                 "embeds": [{
                   "description": "⏳ **Iniciando Build da Extensão: ${{ env.MAVEN_NAME }}** `'"$VERSION_TAG"'`\nPreparando ambiente...",
                   "color": 16776960
                 }]
               }' \
               ${{ secrets.DISCORD_WEBHOOK }}

      - name: Build com Maven
        run: mvn -B clean package

      - name: Localizar JAR e Processar Metadados
        run: |
          FILE=$(find target -name "*.jar" ! -name "original-*" | head -n 1)
          echo "JAR_FILE=$FILE" >> $GITHUB_ENV
          echo "JAR_NAME=$(basename $FILE)" >> $GITHUB_ENV
          echo "JAR_HASH=$(sha256sum "$FILE" | cut -d ' ' -f1)" >> $GITHUB_ENV
          echo "JAR_SIZE=$(stat -c%s "$FILE")" >> $GITHUB_ENV

      - name: Notificar Compilação concluída (Discord)
        if: success()
        run: |
          curl -s -X POST -H "Content-Type: application/json" \
               -d '{
                 "username": "TribeCraft Build",
                 "avatar_url": "${{ env.DISCORD_EMBED_THUMBNAIL }}",
                 "embeds": [{
                   "description": "📦 **Extensão Compilada: ${{ env.MAVEN_NAME }}**\n`${{ env.JAR_NAME }}`\nEnviando para o R2/AWS/GIT...",
                   "color": 3447003
                 }]
               }' \
               ${{ secrets.DISCORD_WEBHOOK }}

      - name: Criar Manifestos JSON
        run: |
          VERSION=${{ github.ref_name }}
          mkdir -p manifests
          
          # latest.json
          echo "{\"latest\": \"$VERSION\"}" > manifests/latest.json
          
          # version.json (Estrutura original mantida)
          cat > manifests/${VERSION}.json <<EOF
          {
            "id": "${{ env.MODULE_ID }}",
            "name": "Vault Extension",
            "version": "$VERSION",
            "channel": "stable",
            "description": "Integração com Vault",
            "authors": ["Ulrich"],
            "core": { "min": "9.0.0" },
            "java": { "min": ${{ env.MIN_JAVA_VERSION }} },
            "dependencies": ["Vault", "UltimateClans"],
            "optionalDependencies": [],
            "file": {
              "name": "${{ env.JAR_NAME }}",
              "size": ${{ env.JAR_SIZE }},
              "sha256": "${{ env.JAR_HASH }}"
            },
            "download": {
              "path": "/extensions/${{ env.MODULE_ID }}/files/${{ env.JAR_NAME }}"
            },
            "release": {
              "date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
              "changelog": ["Release automática"]
            }
          }
          EOF

      - name: Upload para R2 (Cloudflare)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          # Upload do JAR
          aws s3 cp "${{ env.JAR_FILE }}" "s3://$BUCKET/extensions/${{ env.MODULE_ID }}/files/${{ env.JAR_NAME }}" --endpoint-url=$ENDPOINT
          
          # Upload dos Manifestos
          aws s3 cp manifests/latest.json "s3://$BUCKET/extensions/${{ env.MODULE_ID }}/latest.json" --endpoint-url=$ENDPOINT
          aws s3 cp manifests/${{ github.ref_name }}.json "s3://$BUCKET/extensions/${{ env.MODULE_ID }}/versions/${{ github.ref_name }}.json" --endpoint-url=$ENDPOINT

      - name: Criar Release no GitHub
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          files: ${{ env.JAR_FILE }}
          generate_release_notes: true
          name: "Extension Release ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notificar Canal de Log (Simples)
        if: success()
        run: |
          curl -s -X POST -H "Content-Type: application/json" \
               -d '{"content": "🧩 Extensão - **${{ env.MAVEN_NAME }}** `${{ env.MAVEN_VERSION }}` enviada ao R2/AWS/GIT!"}' \
               ${{ secrets.DISCORD_WEBHOOK }}

      - name: Postar Notificação de Release (Elegante)
        if: success()
        shell: python3 {0}
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_RELEASES_WEBHOOK }}
          RAW_MESSAGE: ${{ env.UPDATE_MESSAGE }}
          RAW_TITLE: ${{ env.UPDATE_TITLE }}
          MAVEN_NAME: ${{ env.MAVEN_NAME }}
          MAVEN_VERSION: ${{ env.MAVEN_VERSION }}
          TRIBE: ${{ env.DISCORD_EMBED_TRIBE }}
          THUMB: ${{ env.DISCORD_EMBED_THUMBNAIL }}
        run: |
          import os, json, requests
          m_name, m_ver = os.getenv("MAVEN_NAME", ""), os.getenv("MAVEN_VERSION", "")
          def clean_text(text):
              if not text: return ""
              return text.replace("${MAVEN_NAME}", m_name).replace("${MAVEN_VERSION}", m_ver).replace("[B]", "**").replace("[/B]", "**").replace("[I]", "*").replace("[/I]", "*").strip()
          payload = {
              "username": "TribeCraft Build",
              "avatar_url": os.getenv("TRIBE"),
              "embeds": [{
                  "title": clean_text(os.getenv("RAW_TITLE")),
                  "description": clean_text(os.getenv("RAW_MESSAGE")),
                  "color": 10181046, # Roxo/Purple para Extensões
                  "thumbnail": {"url": os.getenv("THUMB")},
                  "footer": {"text": f"Extensão: {m_name} | TribeCraft Studios", "icon_url": os.getenv("TRIBE")}
              }]
          }
          webhook = os.getenv("WEBHOOK_URL")
          if webhook: requests.post(webhook, json=payload)

      - name: Notificar Falha (Discord)
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
               -d '{
                 "username": "TribeCraft Build",
                 "embeds": [{
                   "title": "❌ Erro na Extensão",
                   "description": "Falha ao compilar `${{ env.MAVEN_NAME }}`.\n[Ver Erro](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})",
                   "color": 15158332
                 }]
               }' \
               ${{ secrets.DISCORD_WEBHOOK }}